name: Dashboard Validation

on:
  push:
    branches:
      - main
    paths:
      - "apps/dashboard/**"
      - "projects/**"
      - "tasks/**"
      - "decisions/**"
      - ".github/workflows/dashboard-validation.yml"
  pull_request:
    paths:
      - "apps/dashboard/**"
      - "projects/**"
      - "tasks/**"
      - "decisions/**"
      - ".github/workflows/dashboard-validation.yml"
  workflow_dispatch:

jobs:
  validate-dashboard:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint dashboard
        run: npm run lint

      - name: Build dashboard
        run: npm run build
